<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctor Finder</title>

    <link
        rel="icon"
        type="image/png"
        href="{{ url_for('static', filename='images/fevicon.png') }}"
    >
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- Theme Toggle -->
<button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
    <span class="toggle-thumb">🌙</span>
</button>

<div class="container">

    <header class="header">
        <h1>Doctor Finder</h1>
        <p class="subtitle">Find the right doctor based on your symptoms</p>
    </header>

    <section class="search-section">

        <label for="symptoms">Symptoms</label>

        <!-- Wrapper for textarea + suggestions -->
        <div class="input-wrapper">
            <textarea
                id="symptoms"
                placeholder="Describe your symptoms"
            ></textarea>

            <div id="suggestions" class="suggestions hidden"></div>
        </div>

        <small class="hint">Try: fever, headache, cough</small>

        <label for="city">City</label>
        <input
            type="text"
            id="city"
            placeholder="Enter your city"
        />

    </section>

    <section class="actions">
        <button id="findBtn" onclick="findDoctors()">Find Doctors</button>

        <div id="loading" class="loading hidden" aria-live="polite">
            🔍 Finding doctors near you...
        </div>
    </section>

    <section class="results-section">
        <div id="result" class="result"></div>
    </section>

    <footer class="footer">
        ⚠️ This is not a medical diagnosis
    </footer>

</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
