<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctor Finder</title>

    <link
        rel="icon"
        type="image/png"
        href="{{ url_for('static', filename='images/fevicon.png') }}"
    >
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- 🌗 Theme Toggle -->
<button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
    <span class="toggle-thumb">🌙</span>
</button>

<div class="container">

    <header class="header">
        <h1>Doctor Finder</h1>
        <p class="subtitle">Find the right doctor based on your symptoms</p>
    </header>

    <section class="search-section">

        <label for="symptoms">Symptoms</label>

        <!-- ✅ Wrapper for textarea + suggestions -->
        <div class="input-wrapper">
            <textarea
                id="symptoms"
                placeholder="Describe your symptoms"
            ></textarea>

            <div id="suggestions" class="suggestions hidden"></div>
        </div>

        <small class="hint">Try: fever, headache, cough</small>

        <label for="city">City</label>
        <input
            type="text"
            id="city"
            placeholder="Enter your city"
        />

    </section>

   <section class="actions">
        <button id="findBtn" onclick="findDoctors()">Find Doctors</button>

        <!-- Doctor actions wrapper -->
        <div id="doctorActions">
            <button class="doctor-register" onclick="openDoctorForm()">
                I’m a Doctor – Register
            </button>

            <button class="doctor-register" onclick="openDoctorLogin()">
                Doctor Login
            </button>
        </div>

        <div id="loading" class="loading hidden" aria-live="polite">
            🔍 Finding doctors near you...
        </div>
    </section>

    <section class="results-section">
        <div id="result" class="result"></div>
    </section>

    <footer class="footer">
        ⚠️ This is not a medical diagnosis
    </footer>

</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
<!-- Doctor Registration Modal -->
<div id="doctorModal" class="modal hidden">
  <div class="modal-content">
    <h3>Doctor Registration</h3>
    <input type="text" id="docUsername" placeholder="Username">
    <input type="password" id="docPassword" placeholder="Password">
    <input type="text" id="docName" placeholder="Doctor Name">
    <input type="text" id="docSpec" placeholder="Specialization">
    <input type="text" id="docHospital" placeholder="Hospital/Clinic">
    <input type="text" id="docCity" placeholder="City">
    <input type="text" id="docPhone" placeholder="Phone">
    <input type="text" id="docLat" placeholder="Latitude">
    <input type="text" id="docLng" placeholder="Longitude">

    <button onclick="submitDoctor()">Submit</button>
    <button class="modal-close" onclick="closeDoctorForm()">Cancel</button>
  </div>
</div>
<!-- Doctor Login Modal -->
<div id="doctorLoginModal" class="modal hidden">
  <div class="modal-content">
    <h3>Doctor Login</h3>
    <input type="text" id="loginUsername" placeholder="Username">
    <input type="password" id="loginPassword" placeholder="Password">
    <button onclick="loginDoctor()">Login</button>
    <button class="modal-close" onclick="closeDoctorLogin()">Cancel</button>
  </div>
</div>
<div id="doctorEditModal" class="modal hidden">
  <div class="modal-content">
    <h3>Edit Profile</h3>

    <input id="editName">
    <input id="editSpec">
    <input id="editHospital">
    <input id="editCity">
    <input id="editPhone">
    <input id="editLat">
    <input id="editLng">

    <button onclick="saveDoctor()">Save</button>
    <button onclick="deleteDoctor()" class="modal-close">Delete</button>
  </div>
</div>
</body>
</html>
